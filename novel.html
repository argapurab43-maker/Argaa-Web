<!DOCTYPE html>
<html>
<head>
<title>Novel</title>
</head>
<body>

<h2>📖 Novel</h2>

<button onclick="kembali()">⬅ Kembali</button>
<button onclick="jadiPenulis()">Jadi Penulis</button>

<br><br>

<button id="addBtn">➕ Tambah Novel</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLu1POb4qzy6yqZ9gz6xHu4u_HlJ8BMMY",
  authDomain: "argaa-web.firebaseapp.com",
  projectId: "argaa-web",
  storageBucket: "argaa-web.firebasestorage.app",
  messagingSenderId: "85804841719",
  appId: "1:85804841719:web:df2129e8586a445307f1f2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function getRole(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  return snap.data().role;
}

onAuthStateChanged(auth, async (user) => {
  let role = await getRole(user);

  if (role !== "admin" && role !== "penulis") {
    document.getElementById("addBtn").style.display = "none";
  }
});

window.kembali = function() {
  window.location.href = "beranda.html";
}

window.jadiPenulis = function() {
  window.location.href = "register_penulis.html";
}
</script>

</body>
</html>
