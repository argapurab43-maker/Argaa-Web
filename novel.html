<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Novel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #222;
  color: white;
}

/* LIST */
.novel {
  border-bottom: 1px solid #ccc;
  padding: 15px;
  cursor: pointer;
}

.novel h3 {
  margin: 0;
}

.novel p {
  margin: 5px 0 0;
  color: gray;
}

/* BUTTON + */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: blue;
  color: white;
  font-size: 30px;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  border: none;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 20px;
  width: 300px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="back()">⬅ Kembali</button>
  <span>📚 Novel</span>
  <button onclick="jadiPenulis()">Jadi Penulis</button>
</div>

<div id="novelList"></div>

<button id="addBtn" class="fab" onclick="addNovel()">+</button>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h2 id="judul"></h2>
    <p id="penulis"></p>
    <button onclick="tutup()">Tutup</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "argaa-web.firebaseapp.com",
  projectId: "argaa-web",
  storageBucket: "argaa-web.firebasestorage.app",
  messagingSenderId: "85804841719",
  appId: "1:..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let roleUser = "";

// CEK USER
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    roleUser = docSnap.data().role;

    // kalau bukan admin/penulis → sembunyikan tombol +
    if (roleUser !== "admin" && roleUser !== "penulis") {
      document.getElementById("addBtn").style.display = "none";
    }
  }

  loadNovel();
});

// LOAD NOVEL
async function loadNovel() {
  const querySnapshot = await getDocs(collection(db, "novels"));
  let list = document.getElementById("novelList");

  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    let div = document.createElement("div");
    div.className = "novel";

    div.innerHTML = `
      <h3>${data.title}</h3>
      <p>${data.author}</p>
    `;

    div.onclick = () => {
      document.getElementById("judul").innerText = data.title;
      document.getElementById("penulis").innerText = "By: " + data.author;
      document.getElementById("popup").style.display = "flex";
    };

    list.appendChild(div);
  });
}

// TAMBAH NOVEL
window.addNovel = async function() {
  let title = prompt("Judul novel:");
  let author = prompt("Nama penulis:");

  if (title && author) {
    await addDoc(collection(db, "novels"), {
      title: title,
      author: author
    });
    loadNovel();
  }
}

// JADI PENULIS
window.jadiPenulis = async function() {
  let user = auth.currentUser;

  await updateDoc(doc(db, "users", user.uid), {
    role: "penulis"
  });

  alert("Sekarang kamu penulis ✍️");
  location.reload();
}

// POPUP
window.tutup = function() {
  document.getElementById("popup").style.display = "none";
}

// NAVIGASI
window.back = function() {
  window.location.href = "beranda.html";
}

</script>

</body>
</html>
