<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Beranda</title>
</head>
<body>

<h1>Selamat Datang 🎉</h1>
<p id="userEmail">Loading...</p>

<button onclick="logout()">Logout</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLu1POb4qzy6yqZ9gz6xHu4u_HlJ8BMMY",
    authDomain: "argaa-web.firebaseapp.com",
    projectId: "argaa-web",
    storageBucket: "argaa-web.firebasestorage.app",
    messagingSenderId: "85804841719",
    appId: "1:85804841719:web:df2129e8586a445307f1f2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // tunggu firebase siap
  setTimeout(() => {
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("userEmail").innerText = "Login sebagai: " + user.email;
      } else {
        window.location.href = "login.html";
      }
    });
  }, 1000);

  window.logout = function() {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
