<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Beranda</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #222;
      color: white;
    }

    .menu {
      margin-top: 50px;
    }

    .menu button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span id="userEmail">Loading...</span>
  <button onclick="logout()">Logout</button>
</div>

<div class="menu">
  <button onclick="goNovel()">📚 Novel</button>
  <button onclick="goGame()">🎮 Game</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLu1POb4qzy6yqZ9gz6xHu4u_HlJ8BMMY",
    authDomain: "argaa-web.firebaseapp.com",
    projectId: "argaa-web",
    storageBucket: "argaa-web.firebasestorage.app",
    messagingSenderId: "85804841719",
    appId: "1:85804841719:web:df2129e8586a445307f1f2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("userEmail").innerText = user.email;
    } else {
      window.location.href = "login.html";
    }
  });

  window.logout = function() {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  }

  window.goNovel = function() {
    window.location.href = "novel.html";
  }

  window.goGame = function() {
    window.location.href = "game.html";
  }

</script>

</body>
</html>
